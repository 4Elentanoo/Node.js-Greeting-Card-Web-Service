<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сервис поздравительных открыток</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Создайте поздравительную открытку</h1>
      <form action="/generate" method="GET" id="cardForm">
        <div class="form-group">
          <label for="name">ФИО поздравляемого:</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label>Пол:</label>
          <label
            ><input type="radio" name="gender" value="male" required />
            Мужской</label
          >
          <label
            ><input type="radio" name="gender" value="female" required />
            Женский</label
          >
        </div>

        <div class="form-group">
          <label for="holiday">Праздник:</label>
          <select id="holiday" name="holiday" required>
            <option value="">Выберите праздник</option>
            <option value="New Year">Новый год</option>
            <option value="Feb 23">23 февраля</option>
            <option value="Mar 8">8 марта</option>
            <option value="Birthday">День рождения</option>
            <option value="Programmer's Day">День программиста</option>
            <option value="Cucumber day">День огурца</option>
          </select>
        </div>

        <button type="submit">Создать открытку и скачать</button>
      </form>
    </div>
  </body>
</html>
